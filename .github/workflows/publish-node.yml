name: Publish Node SDK

on:
  push:
    tags:
      - "node-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: node/package-lock.json
      - run: npm ci
      - name: Check tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#node-v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag version ($tag_version) does not match package.json version ($pkg_version)" >&2
            exit 1
          fi
      # prepublishOnly runs lint, tests and the build before publishing.
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
